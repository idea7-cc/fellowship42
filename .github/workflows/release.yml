name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release tag
        run: pnpm release:check-tag "$GITHUB_REF_NAME"

      - name: Check repository boundaries
        run: pnpm check:architecture

      - name: Check generated Cloudflare bindings
        run: pnpm cf-typegen:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build and verify release artifacts
        run: pnpm release:artifacts

      - name: Verify Worker deployment bundle
        run: pnpm deploy:dry-run

      - name: Verify project-site deployment bundle
        run: pnpm deploy:site:dry-run

      - name: Publish immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          artifacts/release/*
          --verify-tag
          --generate-notes
          --title "Fellowship42 $GITHUB_REF_NAME"
